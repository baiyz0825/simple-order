services:
  app:
    build: .
    container_name: order-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - db-data:/app/data
      - uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key}
      - DATABASE_URL=file:/app/data/order.db
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    driver: local
  uploads:
    driver: local
